<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e17">
<title>Tournée Fred 14e</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0e17;
  --bg2: #131a2b;
  --bg3: #1a2340;
  --accent: #00e5a0;
  --accent2: #00b8ff;
  --text: #e8ecf4;
  --text2: #8a94a8;
  --danger: #ff4757;
  --warning: #ffa502;
  --card: rgba(19,26,43,0.95);
  --radius: 14px;
}
html, body { 
  height:100%; width:100%; overflow:hidden; 
  background:var(--bg); color:var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* ===== SCREENS ===== */
.screen { display:none; position:absolute; inset:0; z-index:1; }
.screen.active { display:flex; flex-direction:column; }

/* ===== HOME SCREEN ===== */
#homeScreen {
  background: linear-gradient(160deg, #0a0e17 0%, #131a2b 50%, #0f1926 100%);
  align-items: center; justify-content: center; gap: 24px; padding: 32px;
}
.home-title {
  font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.home-subtitle { color: var(--text2); font-size: 14px; text-align: center; line-height: 1.5; }
.home-stats {
  display: flex; gap: 16px; margin: 12px 0;
}
.stat-box {
  background: var(--bg2); border-radius: var(--radius); padding: 16px 20px;
  text-align: center; min-width: 90px;
}
.stat-num { font-size: 28px; font-weight: 800; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

.btn-start {
  width: 100%; max-width: 320px; padding: 18px; border: none; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--accent), #00c48c);
  color: #0a0e17; font-size: 18px; font-weight: 800; cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px;
  box-shadow: 0 4px 24px rgba(0,229,160,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-start:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(0,229,160,0.2); }

.btn-load {
  width: 100%; max-width: 320px; padding: 14px; border: 2px solid var(--bg3); border-radius: var(--radius);
  background: transparent; color: var(--text2); font-size: 14px; cursor: pointer;
}

/* ===== MAP SCREEN ===== */
#mapScreen { background: var(--bg); }
#map { flex: 1; z-index: 1; }

/* Top bar */
.top-bar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
  background: linear-gradient(180deg, rgba(10,14,23,0.95) 0%, rgba(10,14,23,0.7) 80%, transparent 100%);
  padding: 12px 16px 24px; pointer-events: none;
}
.top-bar > * { pointer-events: auto; }
.progress-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.progress-text { font-size: 12px; color: var(--text2); white-space: nowrap; font-weight: 600; }
.progress-bar {
  flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px; transition: width 0.5s ease;
}

/* Direction banner */
.direction-banner {
  background: var(--card); border-radius: var(--radius); padding: 14px 16px;
  backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06);
}
.direction-arrow { font-size: 20px; margin-right: 8px; }
.direction-text { font-size: 15px; font-weight: 600; line-height: 1.4; }

/* Bottom panel */
.bottom-panel {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
  padding: 0 12px 16px; pointer-events: none;
}
.bottom-panel > * { pointer-events: auto; }

.stop-card {
  background: var(--card); border-radius: var(--radius); padding: 16px;
  backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 10px;
}
.stop-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.stop-number {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0a0e17; font-weight: 800; font-size: 16px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.stop-addr { font-size: 14px; font-weight: 600; line-height: 1.3; flex: 1; }
.stop-dist {
  font-size: 12px; color: var(--accent); font-weight: 700;
  background: rgba(0,229,160,0.1); padding: 4px 10px; border-radius: 20px;
  white-space: nowrap;
}

.client-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.client-name { font-size: 14px; font-weight: 600; flex: 1; }
.client-box {
  font-size: 11px; color: var(--text2); background: var(--bg3);
  padding: 2px 8px; border-radius: 6px;
}
.client-papers {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.paper-tag {
  font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px;
  white-space: nowrap;
}
.paper-provence { background: rgba(0,184,255,0.15); color: #00b8ff; }
.paper-monde { background: rgba(255,165,2,0.15); color: #ffa502; }
.paper-marseillaise { background: rgba(255,71,87,0.15); color: #ff4757; }
.paper-liberation { background: rgba(255,71,87,0.15); color: #ff6b81; }
.paper-figaro { background: rgba(0,229,160,0.15); color: #00e5a0; }
.paper-tele7 { background: rgba(165,94,234,0.15); color: #a55eea; }
.paper-other { background: rgba(255,255,255,0.08); color: var(--text2); }

.client-note {
  font-size: 12px; color: var(--warning); margin-top: 4px; font-style: italic;
}
.client-suspended {
  opacity: 0.4; text-decoration: line-through;
}

.prep-info {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: rgba(0,229,160,0.08); border-radius: 10px; margin-bottom: 8px;
}
.prep-icon { font-size: 20px; }
.prep-text { font-size: 13px; color: var(--accent); font-weight: 600; }

.btn-row { display: flex; gap: 10px; }
.btn-validate {
  flex: 1; padding: 16px; border: none; border-radius: var(--radius);
  background: linear-gradient(135deg, var(--accent), #00c48c);
  color: #0a0e17; font-size: 16px; font-weight: 800; cursor: pointer;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.btn-validate:active { transform: scale(0.97); }
.btn-skip {
  padding: 16px 20px; border: 2px solid var(--bg3); border-radius: var(--radius);
  background: transparent; color: var(--text2); font-size: 14px; cursor: pointer;
}
.btn-skip:active { background: var(--bg3); }

.btn-sound {
  position: absolute; top: 12px; right: 16px; z-index: 1001;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--card); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(12px);
}

.btn-center {
  position: absolute; bottom: 200px; right: 12px; z-index: 1000;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--card); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(12px);
}

/* ===== FINISH SCREEN ===== */
#finishScreen {
  background: linear-gradient(160deg, #0a0e17 0%, #131a2b 50%, #0f1926 100%);
  align-items: center; justify-content: center; gap: 20px; padding: 32px;
}
.finish-icon { font-size: 64px; }
.finish-title { font-size: 24px; font-weight: 800; color: var(--accent); }
.finish-stat { font-size: 14px; color: var(--text2); }
.btn-restart {
  padding: 16px 40px; border: none; border-radius: var(--radius);
  background: var(--bg3); color: var(--text); font-size: 16px; font-weight: 700; cursor: pointer;
}

/* Leaflet dark tiles */
.leaflet-tile-pane { filter: brightness(0.85) contrast(1.1); }
.leaflet-control-attribution { display: none !important; }
.leaflet-control-zoom { display: none !important; }

/* Pulse animation for current position */
@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(2.5); opacity: 0; }
}

/* Toast */
.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: var(--card); color: var(--text); padding: 16px 28px;
  border-radius: var(--radius); font-size: 16px; font-weight: 700;
  z-index: 9999; backdrop-filter: blur(12px);
  border: 1px solid rgba(0,229,160,0.3);
  animation: toastIn 0.3s ease;
  pointer-events: none;
}
@keyframes toastIn {
  from { opacity:0; transform: translate(-50%,-50%) scale(0.9); }
  to { opacity:1; transform: translate(-50%,-50%) scale(1); }
}

/* Scrollable stop card */
.stop-clients {
  max-height: 180px; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.stop-clients::-webkit-scrollbar { width: 3px; }
.stop-clients::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="homeScreen" class="screen active">
  <div class="home-title">🗞️ Tournée Fred 14e</div>
  <div class="home-subtitle">Guidage de livraison — 14e/15e Marseille<br>Données complètes intégrées</div>
  <div class="home-stats">
    <div class="stat-box"><div class="stat-num" id="statStops">57</div><div class="stat-label">Arrêts</div></div>
    <div class="stat-box"><div class="stat-num" id="statClients">81</div><div class="stat-label">Clients</div></div>
    <div class="stat-box"><div class="stat-num" id="statPapers">85</div><div class="stat-label">Journaux</div></div>
  </div>
  <button class="btn-start" onclick="startTournee()">▶ Démarrer la tournée</button>
  <button class="btn-load" onclick="document.getElementById('fileInput').click()">📂 Charger un autre fichier</button>
  <input type="file" id="fileInput" accept=".json,.tournee" style="display:none" onchange="loadFile(event)">
</div>

<!-- MAP SCREEN -->
<div id="mapScreen" class="screen">
  <div id="map"></div>
  
  <div class="top-bar">
    <div class="progress-row">
      <span class="progress-text" id="progressText">0 / 57</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="direction-banner" id="dirBanner">
      <span class="direction-arrow" id="dirArrow">➡️</span>
      <span class="direction-text" id="dirText">Chargement...</span>
    </div>
  </div>

  <button class="btn-sound" id="btnSound" onclick="toggleSound()">🔊</button>
  <button class="btn-center" onclick="centerOnUser()">📍</button>

  <div class="bottom-panel">
    <div class="stop-card" id="stopCard">
      <div class="prep-info" id="prepInfo">
        <span class="prep-icon">📰</span>
        <span class="prep-text" id="prepText">Préparez 3 journaux</span>
      </div>
      <div class="stop-header">
        <div class="stop-number" id="stopNum">0</div>
        <div class="stop-addr" id="stopAddr">...</div>
        <div class="stop-dist" id="stopDist">--</div>
      </div>
      <div class="stop-clients" id="stopClients"></div>
    </div>
    <div class="btn-row">
      <button class="btn-validate" id="btnValidate" onclick="validateStop()">✅ ARRÊT LIVRÉ</button>
      <button class="btn-skip" onclick="skipStop()">⏭️</button>
    </div>
  </div>
</div>

<!-- FINISH SCREEN -->
<div id="finishScreen" class="screen">
  <div class="finish-icon">🎉</div>
  <div class="finish-title">Tournée terminée !</div>
  <div class="finish-stat" id="finishStat">57 arrêts livrés</div>
  <button class="btn-restart" onclick="location.reload()">🔄 Recommencer</button>
</div>

<script>
// ===== TOURNEE DATA (embedded) =====
let TOURNEE = null;

// ===== STATE =====
let map, routeLine, currentStopIdx = 0;
let userMarker, userLat, userLng, watchId;
let stopMarkers = [];
let soundOn = true;
let speaking = false;
let hasSpokenApproach = false;
let hasSpokenArrival = false;

const APPROACH_DIST = 120; // meters - announce approach
const ARRIVAL_DIST = 40;   // meters - announce arrival
const AUTO_ADVANCE_DIST = 25; // meters - auto validate

// ===== LOAD EMBEDDED DATA =====
async function loadEmbeddedData() {
  try {
    const resp = await fetch('tournee_data.json');
    TOURNEE = await resp.json();
    document.getElementById('statStops').textContent = TOURNEE.length;
    const totalClients = TOURNEE.reduce((s, t) => s + (t.clients?.length || 0), 0);
    document.getElementById('statClients').textContent = totalClients;
    const totalPapers = TOURNEE.reduce((s, t) => 
      s + (t.clients?.reduce((cs, c) => cs + (c.titres?.length || 0), 0) || 0), 0);
    document.getElementById('statPapers').textContent = totalPapers;
  } catch(e) {
    console.log('No embedded data, waiting for file upload');
  }
}
loadEmbeddedData();

function loadFile(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      TOURNEE = JSON.parse(e.target.result);
      document.getElementById('statStops').textContent = TOURNEE.length;
      toast('Fichier chargé ✓');
    } catch(err) {
      toast('Erreur de fichier');
    }
  };
  reader.readAsText(file);
}

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== START =====
function startTournee() {
  if (!TOURNEE || TOURNEE.length === 0) {
    toast('Aucune donnée chargée');
    return;
  }
  showScreen('mapScreen');
  initMap();
  startGPS();
  currentStopIdx = 0;
  updateStopDisplay();
  // Initial voice announcement - announce first stop details
  setTimeout(() => speak("Tournée démarrée. " + getDepartureText(0)), 1000);
}

// ===== MAP =====
function initMap() {
  if (map) return;
  
  // Center on first stop
  const first = TOURNEE[0];
  map = L.map('map', {
    center: [first.lat, first.lng],
    zoom: 15,
    zoomControl: false,
    attributionControl: false
  });
  
  // Dark tiles
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);
  
  // Route line
  const coords = TOURNEE.filter(s => s.lat && s.lng).map(s => [s.lat, s.lng]);
  routeLine = L.polyline(coords, {
    color: '#00e5a0', weight: 3, opacity: 0.5, dashArray: '8,12'
  }).addTo(map);
  
  // Stop markers
  TOURNEE.forEach((stop, i) => {
    if (!stop.lat || !stop.lng) return;
    
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:${i === 0 ? 32 : 24}px; height:${i === 0 ? 32 : 24}px;
        border-radius:50%; 
        background:${i === 0 ? '#ffa502' : 'var(--accent, #00e5a0)'};
        color:#0a0e17; font-weight:800; font-size:${i === 0 ? 14 : 11}px;
        display:flex; align-items:center; justify-content:center;
        border: 2px solid rgba(255,255,255,0.3);
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        opacity: 0.7;
      ">${i}</div>`,
      iconSize: [i === 0 ? 32 : 24, i === 0 ? 32 : 24],
      iconAnchor: [i === 0 ? 16 : 12, i === 0 ? 16 : 12]
    });
    
    const marker = L.marker([stop.lat, stop.lng], { icon }).addTo(map);
    stopMarkers.push(marker);
  });
  
  // Fit bounds
  map.fitBounds(routeLine.getBounds().pad(0.1));
}

// ===== GPS =====
function startGPS() {
  if (!navigator.geolocation) {
    toast('GPS non disponible');
    return;
  }
  watchId = navigator.geolocation.watchPosition(
    onPosition,
    (err) => console.warn('GPS error:', err.message),
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
  );
}

function onPosition(pos) {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  
  if (!userMarker) {
    const icon = L.divIcon({
      className: '',
      html: `<div style="position:relative">
        <div style="width:18px;height:18px;border-radius:50%;background:#00b8ff;border:3px solid white;box-shadow:0 0 12px rgba(0,184,255,0.6);position:relative;z-index:2"></div>
        <div style="position:absolute;top:-3px;left:-3px;width:24px;height:24px;border-radius:50%;background:rgba(0,184,255,0.3);animation:pulse 2s infinite;z-index:1"></div>
      </div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });
    userMarker = L.marker([userLat, userLng], { icon, zIndexOffset: 1000 }).addTo(map);
  } else {
    userMarker.setLatLng([userLat, userLng]);
  }
  
  checkProximity();
}

function centerOnUser() {
  if (userLat && userLng) {
    map.setView([userLat, userLng], 17, { animate: true });
  }
}

// ===== PROXIMITY =====
function checkProximity() {
  if (currentStopIdx >= TOURNEE.length) return;
  
  const stop = TOURNEE[currentStopIdx];
  if (!stop.lat || !stop.lng || !userLat) return;
  
  const dist = getDistance(userLat, userLng, stop.lat, stop.lng);
  
  // Update distance display
  document.getElementById('stopDist').textContent = 
    dist < 1000 ? Math.round(dist) + 'm' : (dist/1000).toFixed(1) + 'km';
  
  // Arrival announcement (40m) - announce client details
  if (dist < ARRIVAL_DIST && !hasSpokenArrival) {
    hasSpokenArrival = true;
    speak(getArrivalText(currentStopIdx));
    // Flash the validate button
    document.getElementById('btnValidate').style.boxShadow = '0 0 30px rgba(0,229,160,0.6)';
  }
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ===== VOICE =====
function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  u.rate = 0.95;
  u.pitch = 1;
  // Try to get a French voice
  const voices = speechSynthesis.getVoices();
  const frVoice = voices.find(v => v.lang.startsWith('fr'));
  if (frVoice) u.voice = frVoice;
  speechSynthesis.speak(u);
}

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('btnSound').textContent = soundOn ? '🔊' : '🔇';
  if (!soundOn) speechSynthesis.cancel();
}

// Preload voices
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

function getDepartureText(nextIdx) {
  // Called right after validating an arrêt - announces direction + prep for the NEXT stop
  const prevStop = nextIdx > 0 ? TOURNEE[nextIdx - 1] : null;
  const nextStop = TOURNEE[nextIdx];
  if (!nextStop) return '';
  
  const totalPapers = nextStop.clients?.reduce((s, c) => {
    if (c.note && c.note.includes('SUSPENDU')) return s;
    return s + (c.titres?.length || 0);
  }, 0) || 0;
  const clientCount = nextStop.clients?.filter(c => !(c.note && c.note.includes('SUSPENDU'))).length || 0;
  
  let text = '';
  
  // Direction from the stop we just left
  if (prevStop?.direction_next) {
    text += prevStop.direction_next + '. ';
  }
  
  // Address of next stop
  const addr = nextStop.adresse?.replace(/,?\s*130\d{2}.*$/, '').replace(/\(.*\)/, '').trim() || '';
  text += `Prochain arrêt : ${addr}. `;
  
  // Prep info
  if (totalPapers > 0) {
    text += `Préparez ${totalPapers} journal${totalPapers > 1 ? 'x' : ''}`;
    if (clientCount > 1) text += ` pour ${clientCount} clients`;
    text += '. ';
  }
  
  return text;
}

function getArrivalText(idx) {
  const stop = TOURNEE[idx];
  let text = 'Arrivée. ';
  
  if (!stop.clients || stop.clients.length === 0) return text;
  
  stop.clients.forEach(c => {
    const isSuspended = (c.note && c.note.includes('SUSPENDU'));
    if (isSuspended) {
      text += `${c.nom} : suspendu. `;
      return;
    }
    text += `${c.nom}`;
    if (c.n) text += `, boîte ${c.n}`;
    if (c.titres?.length) text += ` : ${c.titres.join(', ')}`;
    text += '. ';
  });
  
  return text;
}

// ===== STOP DISPLAY =====
function updateStopDisplay() {
  if (currentStopIdx >= TOURNEE.length) {
    finishTournee();
    return;
  }
  
  const stop = TOURNEE[currentStopIdx];
  
  // Progress
  document.getElementById('progressText').textContent = `${currentStopIdx} / ${TOURNEE.length}`;
  document.getElementById('progressFill').style.width = `${(currentStopIdx / TOURNEE.length) * 100}%`;
  
  // Direction banner
  const prevStop = currentStopIdx > 0 ? TOURNEE[currentStopIdx - 1] : null;
  const dirText = prevStop?.direction_next || stop.instruction || 'En route...';
  document.getElementById('dirText').textContent = dirText;
  
  // Stop info
  document.getElementById('stopNum').textContent = stop.stop;
  document.getElementById('stopAddr').textContent = stop.adresse || 'Adresse inconnue';
  document.getElementById('stopDist').textContent = '--';
  
  // Prep info
  const totalPapers = stop.clients?.reduce((s, c) => {
    if (c.note && c.note.includes('SUSPENDU')) return s;
    return s + (c.titres?.length || 0);
  }, 0) || 0;
  const prepEl = document.getElementById('prepInfo');
  const prepText = document.getElementById('prepText');
  if (totalPapers > 0) {
    prepEl.style.display = 'flex';
    prepText.textContent = `Préparez ${totalPapers} journal${totalPapers > 1 ? 'x' : ''} pour cet arrêt`;
  } else {
    prepEl.style.display = 'none';
  }
  
  // Clients
  const clientsEl = document.getElementById('stopClients');
  clientsEl.innerHTML = '';
  
  (stop.clients || []).forEach(c => {
    const isSuspended = c.note && c.note.includes('SUSPENDU');
    const row = document.createElement('div');
    row.className = 'client-row' + (isSuspended ? ' client-suspended' : '');
    
    let papersHTML = '';
    (c.titres || []).forEach(t => {
      const cls = getPaperClass(t);
      papersHTML += `<span class="paper-tag ${cls}">${t}</span>`;
    });
    
    row.innerHTML = `
      <div class="client-name">${c.nom}</div>
      ${c.n ? `<div class="client-box">📬 ${c.n}</div>` : ''}
      <div class="client-papers">${papersHTML}</div>
    `;
    clientsEl.appendChild(row);
    
    // Note line
    if (c.note) {
      const noteEl = document.createElement('div');
      noteEl.className = 'client-note';
      noteEl.textContent = isSuspended ? '⚠️ SUSPENDU' : '💡 ' + c.note;
      clientsEl.appendChild(noteEl);
    }
  });
  
  // Stop instruction/note
  if (stop.note) {
    const noteEl = document.createElement('div');
    noteEl.className = 'client-note';
    noteEl.style.padding = '8px 0';
    noteEl.textContent = '📝 ' + stop.note;
    clientsEl.appendChild(noteEl);
  }
  
  // Highlight current marker
  highlightCurrentStop();
  
  // Reset proximity flags
  hasSpokenApproach = false;
  hasSpokenArrival = false;
  document.getElementById('btnValidate').style.boxShadow = '';
  
  // Pan map to next stop
  if (stop.lat && stop.lng) {
    map.setView([stop.lat, stop.lng], Math.max(map.getZoom(), 16), { animate: true });
  }
}

function getPaperClass(title) {
  const t = title.toLowerCase();
  if (t.includes('provence')) return 'paper-provence';
  if (t.includes('monde')) return 'paper-monde';
  if (t.includes('marseillaise')) return 'paper-marseillaise';
  if (t.includes('libé')) return 'paper-liberation';
  if (t.includes('figaro')) return 'paper-figaro';
  if (t.includes('télé') || t.includes('tele')) return 'paper-tele7';
  return 'paper-other';
}

function highlightCurrentStop() {
  // Dim all markers, highlight current
  stopMarkers.forEach((m, i) => {
    const el = m.getElement();
    if (!el) return;
    const inner = el.querySelector('div');
    if (!inner) return;
    if (i === currentStopIdx) {
      inner.style.opacity = '1';
      inner.style.transform = 'scale(1.3)';
      inner.style.background = '#ffa502';
      inner.style.boxShadow = '0 0 16px rgba(255,165,2,0.6)';
    } else if (i < currentStopIdx) {
      inner.style.opacity = '0.3';
      inner.style.transform = 'scale(0.8)';
      inner.style.background = '#4a5568';
      inner.style.boxShadow = 'none';
    } else {
      inner.style.opacity = '0.7';
      inner.style.transform = 'scale(1)';
      inner.style.background = '#00e5a0';
      inner.style.boxShadow = 'none';
    }
  });
}

// ===== ACTIONS =====
function validateStop() {
  currentStopIdx++;
  if (currentStopIdx < TOURNEE.length) {
    updateStopDisplay();
    // Announce direction + prep on departure (right after validating previous stop)
    setTimeout(() => speak(getDepartureText(currentStopIdx)), 500);
    toast(`Arrêt ${currentStopIdx - 1} ✓`);
  } else {
    finishTournee();
  }
}

function skipStop() {
  currentStopIdx++;
  if (currentStopIdx < TOURNEE.length) {
    updateStopDisplay();
    setTimeout(() => speak(getDepartureText(currentStopIdx)), 500);
    toast('Arrêt sauté ⏭️');
  } else {
    finishTournee();
  }
}

function finishTournee() {
  showScreen('finishScreen');
  document.getElementById('finishStat').textContent = `${TOURNEE.length} arrêts terminés`;
  speak('Tournée terminée. Bon travail !');
  if (watchId) navigator.geolocation.clearWatch(watchId);
}

// ===== TOAST =====
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// ===== KEEP SCREEN AWAKE =====
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) { /* ignore */ }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
