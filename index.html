<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e17">
<title>Tournée Formation</title>
<script>
// Force cache cleanup on version change
(function(){
  var V='v4b';
  if(localStorage.getItem('app_version')!==V){
    if('caches' in window)caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})});
    if(navigator.serviceWorker)navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(reg){reg.unregister()})});
    localStorage.setItem('app_version',V);
    setTimeout(function(){location.reload(true)},500);
  }
})();
</script>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--bg2:#131a2b;--bg3:#1a2340;--accent:#00e5a0;--accent2:#00b8ff;--text:#e8ecf4;--text2:#8a94a8;--danger:#ff4757;--warning:#ffa502;--card:rgba(19,26,43,0.95);--radius:14px}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.screen{display:none;position:absolute;inset:0;z-index:1}
.screen.active{display:flex;flex-direction:column}

/* HOME */
#homeScreen{background:linear-gradient(160deg,#0a0e17,#131a2b 50%,#0f1926);align-items:center;justify-content:center;gap:20px;padding:32px}
.home-logo{font-size:48px}
.home-title{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-sub{color:var(--text2);font-size:13px;text-align:center}
.home-buttons{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;margin-top:12px}
.btn-home{padding:16px;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:12px;transition:transform .15s}
.btn-home:active{transform:scale(0.97)}
.btn-home .icon{font-size:22px;width:36px;text-align:center}
.btn-home .sublabel{font-size:11px;font-weight:400;opacity:0.7;margin-top:2px}
.btn-primary-home{background:linear-gradient(135deg,var(--accent),#00c48c);color:#0a0e17;box-shadow:0 4px 20px rgba(0,229,160,0.25)}
.btn-secondary-home{background:var(--bg2);color:var(--text);border:1px solid var(--bg3)}

/* HEADER */
.screen-header{display:flex;align-items:center;gap:12px;padding:16px;background:var(--bg2);border-bottom:1px solid var(--bg3);flex-shrink:0}
.btn-back{width:40px;height:40px;border-radius:50%;border:none;background:var(--bg3);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-back:active{background:var(--accent);color:#0a0e17}
.screen-title{font-size:18px;font-weight:700;flex:1}

/* SELECT */
.route-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.route-card{background:var(--bg2);border-radius:var(--radius);padding:16px;border:1px solid var(--bg3);cursor:pointer}
.route-card:active{border-color:var(--accent)}
.route-name{font-size:16px;font-weight:700}
.route-info{font-size:12px;color:var(--text2);margin-top:4px}
.route-empty{color:var(--text2);text-align:center;padding:40px 20px;font-size:14px}

/* ROUTE INFO */
.route-detail{flex:1;overflow-y:auto;padding:16px}
.route-detail-title{font-size:22px;font-weight:800;margin-bottom:4px}
.route-detail-sub{color:var(--text2);font-size:13px;margin-bottom:16px}
.route-stats{display:flex;gap:12px;margin-bottom:20px}
.stat-box{background:var(--bg2);border-radius:var(--radius);padding:14px 18px;text-align:center;flex:1}
.stat-num{font-size:26px;font-weight:800;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.route-stop-preview{background:var(--bg2);border-radius:10px;padding:10px 14px;margin-bottom:6px;font-size:13px;display:flex;gap:8px;align-items:center}
.route-stop-preview .num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#0a0e17;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.route-stop-preview .addr{flex:1;color:var(--text2)}
.btn-go{margin:16px;padding:18px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),#00c48c);color:#0a0e17;font-size:18px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:1px;box-shadow:0 4px 24px rgba(0,229,160,0.3)}
.btn-go:active{transform:scale(0.97)}

/* MAP */
#map{flex:1;z-index:1}
.top-bar{position:absolute;top:0;left:0;right:0;z-index:1000;background:linear-gradient(180deg,rgba(10,14,23,0.95),rgba(10,14,23,0.7) 80%,transparent);padding:12px 16px 24px;pointer-events:none}
.top-bar>*{pointer-events:auto}
.top-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.progress-text{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:600}
.progress-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s}
.nav-banner{background:var(--card);border-radius:var(--radius);padding:12px 14px;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06)}
.nav-instruction{font-size:14px;font-weight:600;line-height:1.4}
.nav-detail{font-size:12px;color:var(--accent2);margin-top:4px}
.bottom-panel{position:absolute;bottom:0;left:0;right:0;z-index:1000;padding:0 12px 16px;pointer-events:none}
.bottom-panel>*{pointer-events:auto}
.stop-card{background:var(--card);border-radius:var(--radius);padding:14px;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);margin-bottom:10px}
.stop-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.stop-number{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0e17;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stop-addr{font-size:13px;font-weight:600;line-height:1.3;flex:1}
.stop-dist{font-size:12px;color:var(--accent);font-weight:700;background:rgba(0,229,160,0.1);padding:4px 10px;border-radius:20px;white-space:nowrap}
.prep-info{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,229,160,0.08);border-radius:10px;margin-bottom:8px}
.prep-text{font-size:13px;color:var(--accent);font-weight:600}
.stop-clients{max-height:160px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.stop-clients::-webkit-scrollbar{width:3px}
.stop-clients::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
.client-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid rgba(255,255,255,0.05)}
.client-name{font-size:13px;font-weight:600;flex:1}
.client-box{font-size:11px;color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:6px}
.client-papers{display:flex;gap:3px;flex-wrap:wrap}
.paper-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap}
.paper-provence{background:rgba(0,184,255,0.15);color:#00b8ff}
.paper-monde{background:rgba(255,165,2,0.15);color:#ffa502}
.paper-marseillaise{background:rgba(255,71,87,0.15);color:#ff4757}
.paper-liberation{background:rgba(255,71,87,0.15);color:#ff6b81}
.paper-figaro{background:rgba(0,229,160,0.15);color:#00e5a0}
.paper-tele7{background:rgba(165,94,234,0.15);color:#a55eea}
.paper-other{background:rgba(255,255,255,0.08);color:var(--text2)}
.client-note{font-size:11px;color:var(--warning);margin-top:2px;font-style:italic}
.client-suspended{opacity:0.4;text-decoration:line-through}
.btn-row{display:flex;gap:10px}
.btn-validate{flex:1;padding:16px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),#00c48c);color:#0a0e17;font-size:16px;font-weight:800;cursor:pointer;text-transform:uppercase}
.btn-validate:active{transform:scale(0.97)}
.btn-skip{padding:16px 18px;border:2px solid var(--bg3);border-radius:var(--radius);background:transparent;color:var(--text2);font-size:14px;cursor:pointer}
.map-btns{position:absolute;right:12px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.map-btn{width:42px;height:42px;border-radius:50%;background:var(--card);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px)}

/* FINISH */
#finishScreen{background:linear-gradient(160deg,#0a0e17,#131a2b 50%,#0f1926);align-items:center;justify-content:center;gap:20px;padding:32px}
.finish-icon{font-size:64px}
.finish-title{font-size:24px;font-weight:800;color:var(--accent)}
.finish-stat{font-size:14px;color:var(--text2)}

.leaflet-tile-pane{filter:brightness(0.85) contrast(1.1)}
.leaflet-control-attribution,.leaflet-control-zoom{display:none!important}
@keyframes pulse{0%{transform:scale(1);opacity:1}100%{transform:scale(2.5);opacity:0}}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);color:var(--text);padding:16px 28px;border-radius:var(--radius);font-size:16px;font-weight:700;z-index:9999;backdrop-filter:blur(12px);border:1px solid rgba(0,229,160,0.3);animation:toastIn .3s;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
</style>
</head>
<body>

<div id="homeScreen" class="screen active">
  <div class="home-logo">🗞️</div>
  <div class="home-title">Tournée Formation</div>
  <div class="home-sub">Guidage de livraison de journaux<br>Marseille</div>
  <div class="home-buttons">
    <button class="btn-home btn-primary-home" onclick="goToSelect()">
      <span class="icon">🚗</span>
      <div><div class="label">Suivre une tournée</div><div class="sublabel">Lancer le guidage GPS</div></div>
    </button>
    <button class="btn-home btn-secondary-home" onclick="document.getElementById('fileInput').click()">
      <span class="icon">📂</span>
      <div><div class="label">Télécharger une tournée</div><div class="sublabel">Charger un fichier .json</div></div>
    </button>
    <button class="btn-home btn-secondary-home" onclick="toast('Fonction à venir')">
      <span class="icon">🎙️</span>
      <div><div class="label">Créer une tournée</div><div class="sublabel">Enregistrer un nouveau parcours</div></div>
    </button>
  </div>
  <input type="file" id="fileInput" style="display:none" accept=".json,.tournee" onchange="loadFile(event)">
</div>

<div id="selectScreen" class="screen">
  <div class="screen-header">
    <button class="btn-back" onclick="goBack()">←</button>
    <div class="screen-title">Choisir une tournée</div>
  </div>
  <div class="route-list" id="routeList"></div>
</div>

<div id="routeInfoScreen" class="screen">
  <div class="screen-header">
    <button class="btn-back" onclick="goBack()">←</button>
    <div class="screen-title" id="routeInfoTitle">Tournée</div>
  </div>
  <div class="route-detail" id="routeDetail"></div>
  <button class="btn-go" onclick="startNavigation()">▶ DÉMARRER LE GUIDAGE</button>
</div>

<div id="mapScreen" class="screen">
  <div id="map"></div>
  <div class="top-bar">
    <div class="top-bar-row">
      <button class="btn-back" onclick="confirmExit()">←</button>
      <span class="progress-text" id="progressText">0 / 57</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="nav-banner" id="navBanner">
      <div class="nav-instruction" id="navInstruction">En route...</div>
      <div class="nav-detail" id="navDetail"></div>
    </div>
  </div>
  <div class="map-btns" style="top:140px">
    <button class="map-btn" id="btnSound" onclick="toggleSound()">🔊</button>
    <button class="map-btn" onclick="centerOnUser()">📍</button>
  </div>
  <div class="bottom-panel">
    <div class="stop-card">
      <div class="prep-info" id="prepInfo"><span>📰</span><span class="prep-text" id="prepText"></span></div>
      <div class="stop-header">
        <div class="stop-number" id="stopNum">0</div>
        <div class="stop-addr" id="stopAddr">...</div>
        <div class="stop-dist" id="stopDist">--</div>
      </div>
      <div class="stop-clients" id="stopClients"></div>
    </div>
    <div class="btn-row">
      <button class="btn-validate" id="btnValidate" onclick="validateStop()">✅ LIVRÉ</button>
      <button class="btn-skip" onclick="skipStop()">⏭️</button>
    </div>
  </div>
</div>

<div id="finishScreen" class="screen">
  <div class="finish-icon">🎉</div>
  <div class="finish-title">Tournée terminée !</div>
  <div class="finish-stat" id="finishStat"></div>
  <button class="btn-home btn-primary-home" onclick="location.reload()" style="max-width:280px">
    <span class="icon">🏠</span><div class="label">Retour à l'accueil</div>
  </button>
</div>

<script>
let ROUTES={},activeRoute=null,activeRouteName='';
let map,routeLine,navRouteLine,currentStopIdx=0;
let userMarker,userLat,userLng,watchId;
let stopMarkers=[];
let soundOn=true,hasSpokenArrival=false;
let navSteps=[],currentNavStepIdx=0;
let screenStack=['homeScreen'];
const ARRIVAL_DIST=40;

// === SCREENS ===
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(screenStack[screenStack.length-1]!==id){screenStack.push(id);history.pushState({screen:id},'')}
  if(id==='mapScreen'&&map)setTimeout(()=>map.invalidateSize(),100);
}
function goBack(){
  if(screenStack.length>1){
    screenStack.pop();
    let prev=screenStack[screenStack.length-1];
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(prev).classList.add('active');
    if(prev==='mapScreen'&&map)setTimeout(()=>map.invalidateSize(),100);
  }
}
function confirmExit(){
  if(confirm('Quitter la tournée en cours ?')){
    if(watchId)navigator.geolocation.clearWatch(watchId);
    watchId=null;
    screenStack=['homeScreen'];
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('homeScreen').classList.add('active');
  }
}
window.addEventListener('popstate',()=>goBack());

// === DATA ===
async function loadEmbeddedData(){
  try{const r=await fetch('tournee_data.json');ROUTES['Tournée Fred 14e']=await r.json()}catch(e){}
  try{const s=localStorage.getItem('tournee_routes');if(s)Object.assign(ROUTES,JSON.parse(s))}catch(e){}
}
loadEmbeddedData();

function loadFile(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      const name=file.name.replace(/\.(json|tournee)$/,'');
      ROUTES[name]=data;
      try{const s={};for(const[k,v]of Object.entries(ROUTES))if(k!=='Tournée Fred 14e')s[k]=v;localStorage.setItem('tournee_routes',JSON.stringify(s))}catch(e){}
      toast('Tournée "'+name+'" chargée ✓');
    }catch(err){toast('Erreur de fichier')}
  };
  reader.readAsText(file);
}

// === SELECT ===
function goToSelect(){
  const list=document.getElementById('routeList');list.innerHTML='';
  const names=Object.keys(ROUTES);
  if(!names.length){list.innerHTML='<div class="route-empty">Aucune tournée disponible.<br>Téléchargez un fichier JSON depuis l\'accueil.</div>';showScreen('selectScreen');return}
  names.forEach(name=>{
    const d=ROUTES[name],stops=d.length,clients=d.reduce((s,t)=>s+(t.clients?.length||0),0);
    const card=document.createElement('div');card.className='route-card';
    card.innerHTML='<div class="route-name">🗞️ '+name+'</div><div class="route-info">'+stops+' arrêts · '+clients+' clients</div>';
    card.onclick=()=>selectRoute(name);list.appendChild(card);
  });
  showScreen('selectScreen');
}

function selectRoute(name){
  activeRoute=ROUTES[name];activeRouteName=name;
  const stops=activeRoute.length,clients=activeRoute.reduce((s,t)=>s+(t.clients?.length||0),0);
  const papers=activeRoute.reduce((s,t)=>s+(t.clients?.reduce((cs,c)=>cs+(c.titres?.length||0),0)||0),0);
  document.getElementById('routeInfoTitle').textContent=name;
  let html='<div class="route-detail-title">'+name+'</div><div class="route-detail-sub">Guidage GPS turn-by-turn</div>';
  html+='<div class="route-stats"><div class="stat-box"><div class="stat-num">'+stops+'</div><div class="stat-label">Arrêts</div></div>';
  html+='<div class="stat-box"><div class="stat-num">'+clients+'</div><div class="stat-label">Clients</div></div>';
  html+='<div class="stat-box"><div class="stat-num">'+papers+'</div><div class="stat-label">Journaux</div></div></div>';
  const preview=stops<=10?activeRoute:[...activeRoute.slice(0,6),null,...activeRoute.slice(-3)];
  preview.forEach(s=>{
    if(!s){html+='<div class="route-stop-preview" style="justify-content:center;color:var(--text2)">⋯</div>';return}
    const addr=(s.adresse||'').replace(/,?\s*130\d{2}.*$/,'');
    html+='<div class="route-stop-preview"><div class="num">'+s.stop+'</div><div class="addr">'+addr+'</div></div>';
  });
  document.getElementById('routeDetail').innerHTML=html;
  showScreen('routeInfoScreen');
}

// === START ===
function startNavigation(){
  if(!activeRoute||!activeRoute.length){toast('Aucune donnée');return}
  currentStopIdx=0;showScreen('mapScreen');initMap();startGPS();updateStopDisplay();
  setTimeout(()=>speak("Tournée démarrée. "+getDepartureText(0)),1000);
}

// === MAP ===
function initMap(){
  if(map){map.remove();map=null}stopMarkers=[];userMarker=null;
  const f=activeRoute[0];
  map=L.map('map',{center:[f.lat,f.lng],zoom:15,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  const coords=activeRoute.filter(s=>s.lat&&s.lng).map(s=>[s.lat,s.lng]);
  routeLine=L.polyline(coords,{color:'#00e5a0',weight:3,opacity:0.4,dashArray:'8,12'}).addTo(map);
  activeRoute.forEach((stop,i)=>{
    if(!stop.lat||!stop.lng)return;
    const icon=L.divIcon({className:'',
      html:'<div style="width:'+(i===0?30:22)+'px;height:'+(i===0?30:22)+'px;border-radius:50%;background:'+(i===0?'#ffa502':'#00e5a0')+';color:#0a0e17;font-weight:800;font-size:'+(i===0?13:10)+'px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.3);box-shadow:0 2px 8px rgba(0,0,0,0.4);opacity:0.7">'+i+'</div>',
      iconSize:[i===0?30:22,i===0?30:22],iconAnchor:[i===0?15:11,i===0?15:11]});
    stopMarkers.push(L.marker([stop.lat,stop.lng],{icon}).addTo(map));
  });
  map.fitBounds(routeLine.getBounds().pad(0.1));
}

// === GPS ===
function startGPS(){
  if(watchId)navigator.geolocation.clearWatch(watchId);
  if(!navigator.geolocation){toast('GPS non disponible');return}
  watchId=navigator.geolocation.watchPosition(onPosition,err=>console.warn('GPS:',err.message),{enableHighAccuracy:true,maximumAge:3000,timeout:10000});
}
function onPosition(pos){
  userLat=pos.coords.latitude;userLng=pos.coords.longitude;
  if(!userMarker){
    const icon=L.divIcon({className:'',
      html:'<div style="position:relative"><div style="width:16px;height:16px;border-radius:50%;background:#00b8ff;border:3px solid white;box-shadow:0 0 12px rgba(0,184,255,0.6);position:relative;z-index:2"></div><div style="position:absolute;top:-4px;left:-4px;width:24px;height:24px;border-radius:50%;background:rgba(0,184,255,0.3);animation:pulse 2s infinite;z-index:1"></div></div>',
      iconSize:[16,16],iconAnchor:[8,8]});
    userMarker=L.marker([userLat,userLng],{icon,zIndexOffset:1000}).addTo(map);
  }else{userMarker.setLatLng([userLat,userLng])}
  checkProximity();updateNavStep();
}
function centerOnUser(){if(userLat&&userLng)map.setView([userLat,userLng],17,{animate:true})}

// === OSRM TURN-BY-TURN ===
async function fetchRoute(fLat,fLng,tLat,tLng){
  try{
    const url='https://router.project-osrm.org/route/v1/driving/'+fLng+','+fLat+';'+tLng+','+tLat+'?overview=full&geometries=geojson&steps=true';
    const resp=await fetch(url);const data=await resp.json();
    if(data.code==='Ok'&&data.routes?.length){
      const route=data.routes[0];
      if(navRouteLine)map.removeLayer(navRouteLine);
      const coords=route.geometry.coordinates.map(c=>[c[1],c[0]]);
      navRouteLine=L.polyline(coords,{color:'#00b8ff',weight:5,opacity:0.8}).addTo(map);
      navSteps=[];
      route.legs[0].steps.forEach(step=>{
        navSteps.push({instruction:translateManeuver(step.maneuver,step.name),distance:step.distance,lat:step.maneuver.location[1],lng:step.maneuver.location[0]});
      });
      currentNavStepIdx=0;updateNavBanner();
    }
  }catch(e){console.warn('Route error:',e)}
}

function translateManeuver(m,street){
  const t=m.type,mod=m.modifier||'',name=street||'';
  const dirs={'left':'à gauche','right':'à droite','slight left':'légèrement à gauche','slight right':'légèrement à droite','sharp left':'forte à gauche','sharp right':'forte à droite','straight':'tout droit','uturn':'demi-tour'};
  const d=dirs[mod]||mod;
  if(t==='depart')return name?'Partez sur '+name:'Départ';
  if(t==='arrive')return'Vous êtes arrivé';
  if(t==='turn')return name?'Tournez '+d+' sur '+name:'Tournez '+d;
  if(t==='new name'||t==='continue')return name?'Continuez sur '+name:'Continuez tout droit';
  if(t==='fork')return'Prenez '+d;
  if(t==='roundabout'||t==='rotary')return name?'Au rond-point, prenez '+name:'Au rond-point';
  if(t==='end of road')return'Fin de route, tournez '+d;
  return name?d+' sur '+name:d||'Continuez';
}

function updateNavStep(){
  if(!navSteps.length||!userLat)return;
  for(let i=currentNavStepIdx;i<navSteps.length-1;i++){
    const step=navSteps[i+1];
    const dist=getDistance(userLat,userLng,step.lat,step.lng);
    if(dist<30){currentNavStepIdx=i+1;updateNavBanner();if(soundOn&&step.instruction!=='Vous êtes arrivé')speak(step.instruction);break}
  }
  if(currentNavStepIdx<navSteps.length-1){
    const next=navSteps[currentNavStepIdx+1];
    if(next){const dist=getDistance(userLat,userLng,next.lat,next.lng);
      document.getElementById('navDetail').textContent='Dans '+(dist<1000?Math.round(dist)+'m':(dist/1000).toFixed(1)+'km')+' : '+next.instruction}
  }
}
function updateNavBanner(){
  if(!navSteps.length)return;
  const step=navSteps[currentNavStepIdx];
  document.getElementById('navInstruction').textContent=step?step.instruction:'En route...';
}

// === PROXIMITY ===
function checkProximity(){
  if(currentStopIdx>=activeRoute.length)return;
  const stop=activeRoute[currentStopIdx];if(!stop.lat||!stop.lng||!userLat)return;
  const dist=getDistance(userLat,userLng,stop.lat,stop.lng);
  document.getElementById('stopDist').textContent=dist<1000?Math.round(dist)+'m':(dist/1000).toFixed(1)+'km';
  if(dist<ARRIVAL_DIST&&!hasSpokenArrival){
    hasSpokenArrival=true;speak(getArrivalText(currentStopIdx));
    document.getElementById('btnValidate').style.boxShadow='0 0 30px rgba(0,229,160,0.6)';
  }
}
function getDistance(lat1,lon1,lat2,lon2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// === VOICE ===
function speak(text){
  if(!soundOn||!window.speechSynthesis)return;speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='fr-FR';u.rate=0.95;
  const v=speechSynthesis.getVoices(),fr=v.find(x=>x.lang.startsWith('fr'));if(fr)u.voice=fr;
  speechSynthesis.speak(u);
}
function toggleSound(){soundOn=!soundOn;document.getElementById('btnSound').textContent=soundOn?'🔊':'🔇';if(!soundOn)speechSynthesis.cancel()}
if(window.speechSynthesis)speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

function getDepartureText(nextIdx){
  const prev=nextIdx>0?activeRoute[nextIdx-1]:null,next=activeRoute[nextIdx];if(!next)return'';
  let tp=0,cc=0;for(const c of(next.clients||[])){if(c.note&&c.note.includes('SUSPENDU'))continue;tp+=(c.titres?.length||0);cc++}
  let text='';if(prev?.direction_next)text+=prev.direction_next+'. ';
  const addr=(next.adresse||'').replace(/,?\s*130\d{2}.*$/,'').replace(/\(.*\)/,'').trim();
  text+='Prochain arrêt : '+addr+'. ';
  if(tp>0){text+='Préparez '+tp+' journal'+(tp>1?'x':'');if(cc>1)text+=' pour '+cc+' clients';text+='. '}
  return text;
}
function getArrivalText(idx){
  const stop=activeRoute[idx];let text='Arrivée. ';
  for(const c of(stop.clients||[])){
    if(c.note&&c.note.includes('SUSPENDU')){text+=c.nom+' : suspendu. ';continue}
    text+=c.nom;if(c.n)text+=', boîte '+c.n;if(c.titres?.length)text+=' : '+c.titres.join(', ');text+='. ';
  }
  return text;
}

// === DISPLAY ===
function updateStopDisplay(){
  if(currentStopIdx>=activeRoute.length){finishTournee();return}
  const stop=activeRoute[currentStopIdx];
  document.getElementById('progressText').textContent=currentStopIdx+' / '+activeRoute.length;
  document.getElementById('progressFill').style.width=(currentStopIdx/activeRoute.length*100)+'%';
  const prev=currentStopIdx>0?activeRoute[currentStopIdx-1]:null;
  document.getElementById('navInstruction').textContent=prev?.direction_next||stop.instruction||'En route...';
  document.getElementById('navDetail').textContent='';
  document.getElementById('stopNum').textContent=stop.stop;
  document.getElementById('stopAddr').textContent=stop.adresse||'';
  document.getElementById('stopDist').textContent='--';
  let tp=0;for(const c of(stop.clients||[])){if(c.note&&c.note.includes('SUSPENDU'))continue;tp+=(c.titres?.length||0)}
  const pi=document.getElementById('prepInfo');
  if(tp>0){pi.style.display='flex';document.getElementById('prepText').textContent='Préparez '+tp+' journal'+(tp>1?'x':'')+' pour cet arrêt'}else{pi.style.display='none'}
  const cl=document.getElementById('stopClients');cl.innerHTML='';
  for(const c of(stop.clients||[])){
    const susp=c.note&&c.note.includes('SUSPENDU');
    const row=document.createElement('div');row.className='client-row'+(susp?' client-suspended':'');
    let papers=(c.titres||[]).map(t=>'<span class="paper-tag '+getPaperClass(t)+'">'+t+'</span>').join('');
    row.innerHTML='<div class="client-name">'+c.nom+'</div>'+(c.n?'<div class="client-box">📬 '+c.n+'</div>':'')+'<div class="client-papers">'+papers+'</div>';
    cl.appendChild(row);
    if(c.note){const n=document.createElement('div');n.className='client-note';n.textContent=susp?'⚠️ SUSPENDU':'💡 '+c.note;cl.appendChild(n)}
  }
  highlightCurrentStop();hasSpokenArrival=false;document.getElementById('btnValidate').style.boxShadow='';
  if(stop.lat&&stop.lng)map.setView([stop.lat,stop.lng],Math.max(map.getZoom(),16),{animate:true});
  fetchNavRoute();
}

async function fetchNavRoute(){
  const stop=activeRoute[currentStopIdx];if(!stop.lat||!stop.lng)return;
  let fLat,fLng;
  if(userLat&&userLng){fLat=userLat;fLng=userLng}
  else if(currentStopIdx>0){const p=activeRoute[currentStopIdx-1];fLat=p.lat;fLng=p.lng}
  else return;
  await fetchRoute(fLat,fLng,stop.lat,stop.lng);
}

function getPaperClass(t){t=t.toLowerCase();if(t.includes('provence'))return'paper-provence';if(t.includes('monde'))return'paper-monde';if(t.includes('marseillaise'))return'paper-marseillaise';if(t.includes('libé'))return'paper-liberation';if(t.includes('figaro'))return'paper-figaro';if(t.includes('télé')||t.includes('tele'))return'paper-tele7';return'paper-other'}

function highlightCurrentStop(){
  stopMarkers.forEach((m,i)=>{const el=m.getElement();if(!el)return;const inner=el.querySelector('div');if(!inner)return;
    if(i===currentStopIdx){inner.style.opacity='1';inner.style.transform='scale(1.3)';inner.style.background='#ffa502';inner.style.boxShadow='0 0 16px rgba(255,165,2,0.6)'}
    else if(i<currentStopIdx){inner.style.opacity='0.3';inner.style.transform='scale(0.8)';inner.style.background='#4a5568';inner.style.boxShadow='none'}
    else{inner.style.opacity='0.7';inner.style.transform='scale(1)';inner.style.background='#00e5a0';inner.style.boxShadow='none'}
  });
}

// === ACTIONS ===
function validateStop(){
  currentStopIdx++;
  if(currentStopIdx<activeRoute.length){updateStopDisplay();setTimeout(()=>speak(getDepartureText(currentStopIdx)),500);toast('Arrêt '+(currentStopIdx-1)+' ✓')}
  else finishTournee();
}
function skipStop(){
  currentStopIdx++;
  if(currentStopIdx<activeRoute.length){updateStopDisplay();setTimeout(()=>speak(getDepartureText(currentStopIdx)),500);toast('Arrêt sauté ⏭️')}
  else finishTournee();
}
function finishTournee(){
  showScreen('finishScreen');document.getElementById('finishStat').textContent=activeRoute.length+' arrêts terminés';
  speak('Tournée terminée. Bon travail !');if(watchId)navigator.geolocation.clearWatch(watchId);
}

function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2000)}
async function requestWakeLock(){try{if('wakeLock' in navigator)await navigator.wakeLock.request('screen')}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')requestWakeLock()});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
